<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Produksi PT. Tirta Teknosys</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; --info: #2980b9; --warning: #f39c12; --accent: #0099da; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .brand-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .title-area h1 { margin: 0; font-size: 20px; color: var(--primary); text-transform: uppercase; }
        
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-save:hover { background: #007bb1; }

        #statusDisplay { padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; display: none; font-weight: bold; }
        .status-success { background: #e8f5e9; color: var(--success); border: 1px solid var(--success); }
        .status-process { background: #e3f2fd; color: var(--info); border: 1px solid var(--info); }
        .status-late { background: #fdf2f2; color: var(--danger); border: 1px solid var(--danger); }

        .cloud-section { margin-top: 30px; }
        .cloud-title { background: var(--success); color: white; padding: 10px; border-radius: 5px 5px 0 0; font-size: 13px; font-weight: bold; }
        iframe { width: 100%; height: 500px; border: 2px solid var(--success); border-radius: 0 0 10px 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div class="title-area">
            <h1>Daily Report Produksi</h1>
            <p style="margin:0; font-size:12px;">PT. TIRTA TEKNOSYS</p>
        </div>
        <button onclick="location.reload()" style="padding:5px 10px; cursor:pointer;">🔄 Refresh</button>
    </div>

    <div id="statusDisplay"></div>

    <div class="form-section">
        <div class="field"><label>NO SPP</label><input type="text" id="spp" placeholder="Contoh: SPP-001" oninput="this.value = this.value.toUpperCase()"></div>
        <div class="field"><label>OPERATOR</label>
            <select id="namaOp">
                <option value="">-- Pilih Nama --</option>
                <option value="Suhendra">Suhendra</option>
                <option value="Hario Rizki">Hario Rizki</option>
                <option value="Dhema Ferlandi Putra">Dhema Ferlandi Putra</option>
                <option value="Muhammad Iqbal">Muhammad Iqbal</option>
                <option value="Mohamad Ramadan">Mohamad Ramadan</option>
                <option value="Ngatiyo">Ngatiyo</option>
                <option value="Khairuddin">Khairuddin</option>
                <option value="Budi Septiyanto">Budi Septiyanto</option>
            </select>
        </div>
        <div class="field"><label>PRODUK</label>
            <select id="namaProduk">
                <option value="">-- Pilih Produk --</option>
                <option value="Aquatech TRO 250 GPD R">Aquatech TRO 250 GPD R</option>
                <option value="Aquatech TRO 450 GPD R">Aquatech TRO 450 GPD R</option>
                <option value="Aquatech TRO 1500 GPD S">Aquatech TRO 1500 GPD S</option>
                <option value="Frame TRO 1500 GPD">Frame TRO 1500 GPD</option>
                <option value="other">Other</option>
            </select>
        </div>
    </div>

    <div class="form-section">
        <div class="field"><label>TAHAP PRODUKSI</label>
            <select id="tahap">
                <option value="Persiapan">1. Persiapan Material</option>
                <option value="Perakitan">2. Perakitan Frame</option>
                <option value="Finishing">3. Proses Cat / Finishing</option>
                <option value="Instalasi">4. Instalasi Membran</option>
                <option value="QC">5. Running Test & QC</option>
                <option value="Selesai">6. Packing & Selesai</option>
            </select>
        </div>
        <div class="field"><label>TANGGAL UPDATE</label><input type="date" id="tglUpdate"></div>
        <div class="field"><label>KENDALA (Opsional)</label><textarea id="kendala" rows="1"></textarea></div>
    </div>

    <button id="btnSave" class="btn-save" onclick="saveData()">KIRIM LAPORAN KE CLOUD</button>

    <div class="cloud-section">
        <div class="cloud-title">📊 DATABASE PUSAT (SINKRON HP & LAPTOP)</div>
        <iframe src="LINK_PUBLISH_TO_WEB_GOOGLE_SHEETS"></iframe>
    </div>
</div>

<script>
    // 1. GANTI LINK INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
    const urlScript = "LINK_WEB_APP_SCRIPT_ANDA";

    document.getElementById('tglUpdate').valueAsDate = new Date();

    async function saveData() {
        const spp = document.getElementById('spp').value;
        const nama = document.getElementById('namaOp').value;
        const produk = document.getElementById('namaProduk').value;
        const tahap = document.getElementById('tahap').value;
        const tgl = document.getElementById('tglUpdate').value;
        const kendala = document.getElementById('kendala').value || "-";

        if (!spp || !nama || !produk) {
            alert("Harap isi No SPP, Nama, dan Produk!");
            return;
        }

        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳ Sedang Mengirim...";
        btn.disabled = true;

        const dataKirim = {
            spp: spp,
            nama: nama,
            produk: produk,
            tahap: tahap,
            tglUpdate: tgl,
            kendala: kendala,
            status: "UPDATE"
        };

        try {
            // Kirim data ke Google Apps Script
            await fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataKirim)
            });

            alert("✅ Laporan Berhasil Terkirim!");
            document.getElementById('spp').value = "";
            document.getElementById('kendala').value = "";
            
            // Beri notifikasi di layar
            const display = document.getElementById('statusDisplay');
            display.style.display = "block";
            display.className = "status-success";
            display.innerText = "Data SPP " + spp + " Berhasil Diupdate ke Cloud!";
            
        } catch (error) {
            console.error(error);
            alert("Gagal mengirim ke cloud. Cek koneksi internet.");
        } finally {
            btn.innerText = "KIRIM LAPORAN KE CLOUD";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
