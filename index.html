<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <title>Daily Report Produksi PT. Tirta Teknosys</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; --info: #2980b9; --warning: #f39c12; --accent: #0099da; }
        body.dark-mode { background: #1a1a1a; color: #eee; }
        body.dark-mode .container { background: #2d2d2d; color: #eee; border: 1px solid #444; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #3d3d3d; color: white; border-color: #555; }
        body.dark-mode tr:hover { background: #3a3a3a; }
        body.dark-mode .chart-section { background: #333; border-color: #444; }
        body.dark-mode .status-col { background: #3d3d3d; color: white; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; transition: 0.3s; }
        .container { max-width: 1450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .brand-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); padding-bottom: 15px; margin-bottom: 25px; }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .company-logo { height: 75px; width: auto; object-fit: contain; }
        .title-area h1 { margin: 0; font-size: 26px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .title-area p { margin: 0; font-size: 13px; color: #666; font-weight: 600; letter-spacing: 1px; }
        .btn-tool { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; margin-left: 5px; font-size: 11px; }
        .btn-admin { background: var(--primary); }
        .btn-backup { background: #7f8c8d; }
        .btn-export { background: var(--success); }
        .dashboard-wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 25px; align-items: start; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { padding: 15px; border-radius: 10px; color: white; text-align: center; position: relative; }
        .efficiency-tag { position: absolute; top: 5px; right: 10px; font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 4px; }
        .chart-section { display: grid; grid-template-columns: 200px 1fr; gap: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .chart-container { display: flex; flex-direction: column; align-items: center; }
        .pie-chart { width: 140px; height: 140px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); transition: 0.5s; }
        .status-list-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .status-col { background: white; padding: 10px; border-radius: 8px; border-top: 4px solid #ccc; max-height: 180px; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-col h4 { margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .item-list { font-size: 10px; list-style: none; padding: 0; margin: 0; }
        .item-list li { padding: 4px 0; border-bottom: 1px solid #f0f0f0; line-height: 1.2; }
        .form-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; text-transform: uppercase; }
        #statusDisplay { padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; display: none; }
        .status-success { background: #e8f5e9; color: var(--success); border: 2px solid var(--success); display: block !important; }
        .status-process { background: #e3f2fd; color: var(--info); border: 2px solid var(--info); display: block !important; }
        .status-late { background: #fdf2f2; color: var(--danger); border: 2px solid var(--danger); display: block !important; }
        .progress-container { background: rgba(0,0,0,0.1); height: 15px; border-radius: 10px; margin: 10px auto; overflow: hidden; width: 80%; }
        .progress-bar { height: 100%; background: var(--info); transition: 0.5s; width: 0%; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 20px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        tr.late-row { background: #fff5f5; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-save:hover { background: #007bb1; transform: translateY(-2px); }
        .summary-title { background: var(--primary); color: white; padding: 8px 15px; border-radius: 5px; margin-top: 30px; display: inline-block; font-size: 12px; }
        .sticky-notes { position: fixed; bottom: 20px; right: 20px; width: 220px; background: #fff176; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1001; }
        .sticky-notes.minimized { height: 35px; }
        .notes-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; }
        .badge-late { display: block; font-size: 9px; margin-top: 3px; color: #fff; background: #c0392b; border-radius: 3px; padding: 1px; }
    </style>
</head>
