<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daily Report Produksi PT. Tirta Teknosys</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; --info: #2980b9; --warning: #f39c12; --accent: #0099da; }
        
        body.dark-mode { background: #1a1a1a; color: #eee; }
        body.dark-mode .container { background: #2d2d2d; color: #eee; border: 1px solid #444; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #3d3d3d; color: white; border-color: #555; }
        body.dark-mode tr:hover { background: #3a3a3a; }
        body.dark-mode .chart-section { background: #333; border-color: #444; }
        body.dark-mode .status-col { background: #3d3d3d; color: white; }

        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; transition: 0.3s; }
        .container { max-width: 1450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* BRANDING HEADER */
        .brand-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); padding-bottom: 15px; margin-bottom: 25px; }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .company-logo { height: 75px; width: auto; object-fit: contain; }
        .title-area h1 { margin: 0; font-size: 26px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .title-area p { margin: 0; font-size: 13px; color: #666; font-weight: 600; letter-spacing: 1px; }

        .btn-tool { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; margin-left: 5px; font-size: 11px; }
        .btn-admin { background: var(--primary); }
        .btn-backup { background: #7f8c8d; }
        .btn-export { background: var(--success); }

        .dashboard-wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 25px; align-items: start; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { padding: 15px; border-radius: 10px; color: white; text-align: center; position: relative; }
        .efficiency-tag { position: absolute; top: 5px; right: 10px; font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 4px; }

        .chart-section { display: grid; grid-template-columns: 200px 1fr; gap: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .chart-container { display: flex; flex-direction: column; align-items: center; }
        .pie-chart { width: 140px; height: 140px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); transition: 0.5s; }
        
        .status-list-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .status-col { background: white; padding: 10px; border-radius: 8px; border-top: 4px solid #ccc; max-height: 180px; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-col h4 { margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .item-list { font-size: 10px; list-style: none; padding: 0; margin: 0; }
        .item-list li { padding: 4px 0; border-bottom: 1px solid #f0f0f0; line-height: 1.2; }
        
        .form-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; text-transform: uppercase; }
        
        #statusDisplay { padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; display: none; }
        .status-success { background: #e8f5e9; color: var(--success); border: 2px solid var(--success); display: block !important; }
        .status-process { background: #e3f2fd; color: var(--info); border: 2px solid var(--info); display: block !important; }
        .status-late { background: #fdf2f2; color: var(--danger); border: 2px solid var(--danger); display: block !important; }
        
        .progress-container { background: rgba(0,0,0,0.1); height: 15px; border-radius: 10px; margin: 10px auto; overflow: hidden; width: 80%; }
        .progress-bar { height: 100%; background: var(--info); transition: 0.5s; width: 0%; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 20px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        tr.late-row { background: #fff5f5; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-save:hover { background: #007bb1; transform: translateY(-2px); }
        .summary-title { background: var(--primary); color: white; padding: 8px 15px; border-radius: 5px; margin-top: 30px; display: inline-block; font-size: 12px; }

        .sticky-notes { position: fixed; bottom: 20px; right: 20px; width: 220px; background: #fff176; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1001; }
        .sticky-notes.minimized { height: 35px; }
        .notes-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; }
        .badge-late { display: block; font-size: 9px; margin-top: 3px; color: #fff; background: #c0392b; border-radius: 3px; padding: 1px; }
    </style>
</head>
<body>

<button onclick="toggleDarkMode()" style="position:fixed; top:10px; left:10px; z-index:1000; padding:5px; border-radius:50%; border:none; cursor:pointer; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.2)">🌓</button>

<div class="container">
    <div class="brand-header">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/randitirtateknosys-beep/daily-produksi/main/logo.png" alt="PT Tirta Teknosys" class="company-logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMDA5OWRhIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IndoaXRlIiBmb250LXNpemU9IjQwIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSJib2xkIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjM1ZW0iPlRUPC90ZXh0Pjwvc3ZnPg=='">
            <div class="title-area">
                <h1>Daily Report Produksi</h1>
                <p>PT. TIRTA TEKNOSYS | Water Treatment Specialist</p>
            </div>
        </div>
        <div>
            <button onclick="exportToCSV()" class="btn-tool btn-export">📊 EXPORT CSV</button>
            <button onclick="handleLogin()" id="btnLogin" class="btn-tool btn-admin">ADMIN LOGIN</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="stats-grid">
            <div class="stat-card" style="background: var(--info)">Total SPP:<br><b id="statTotal" style="font-size:24px">0</b></div>
            <div class="stat-card" style="background: var(--warning)">Proses:<br><b id="statProses" style="font-size:24px">0</b></div>
            <div class="stat-card" style="background: var(--success)">Selesai:<br><b id="statSelesai" style="font-size:24px">0</b>
                <span class="efficiency-tag" id="effRate">100% Eff</span>
            </div>
            <div class="stat-card" style="background: var(--danger)">Telat:<br><b id="statTelat" style="font-size:24px">0</b></div>
        </div>
        
        <div class="chart-section">
            <div class="chart-container">
                <div style="font-size: 10px; font-weight: bold; margin-bottom: 5px;">STATUS GRAFIK</div>
                <div id="pieChart" class="pie-chart"></div>
            </div>
            <div class="status-list-container">
                <div class="status-col" style="border-top-color: var(--warning)">
                    <h4 style="color:var(--warning)">PROSES <span id="countP">0</span></h4>
                    <ul id="listProses" class="item-list"></ul>
                </div>
                <div class="status-col" style="border-top-color: var(--success)">
                    <h4 style="color:var(--success)">SELESAI <span id="countS">0</span></h4>
                    <ul id="listSelesai" class="item-list"></ul>
                </div>
                <div class="status-col" style="border-top-color: var(--danger)">
                    <h4 style="color:var(--danger)">TELAT <span id="countT">0</span></h4>
                    <ul id="listTelat" class="item-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <div id="statusDisplay">
        <div id="statusText" style="font-weight: 900; font-size: 24px; margin-bottom: 5px;"></div>
        <div class="progress-container"><div id="progBar" class="progress-bar"></div></div>
        <div id="percentText" style="font-size: 14px; font-weight: bold;"></div>
    </div>

    <div class="form-section">
        <div class="field"><label>No SPP (Alt+S)</label><input type="text" id="spp" oninput="syncData(); this.value = this.value.toUpperCase();"></div>
        <div class="field"><label>Operator</label>
            <select id="namaOp">
                <option value="">-- Pilih --</option>
                <option value="Suhendra">Suhendra</option>
                <option value="Hario Rizki">Hario Rizki</option>
                <option value="Dhema Ferlandi Putra">Dhema Ferlandi Putra</option>
                <option value="Muhammad Iqbal">Muhammad Iqbal</option>
                <option value="Mohamad Ramadan">Mohamad Ramadan</option>
                <option value="Ngatiyo">Ngatiyo</option>
                <option value="Khairuddin">Khairuddin</option>
                <option value="Budi Septiyanto">Budi Septiyanto</option>
            </select>
        </div>
        <div class="field"><label>Nama Produk</label>
            <select id="namaProduk">
                <option value="">-- Pilih Produk --</option>
                <option value="Aquatech TRO 250 GPD R">Aquatech TRO 250 GPD R</option>
                <option value="Aquatech TRO 450 GPD R">Aquatech TRO 450 GPD R</option>
                <option value="Aquatech TRO 800 GPD R">Aquatech TRO 800 GPD R</option>
                <option value="Aquatech TRO 250 GPD E">Aquatech TRO 250 GPD E</option>
                <option value="Aquatech TRO 450 GPD E">Aquatech TRO 450 GPD E</option>
                <option value="Aquatech TRO 1500 GPD S">Aquatech TRO 1500 GPD S</option>
                <option value="Aquatech TRO 3000 GPD S">Aquatech TRO 3000 GPD S</option>
                <option value="Aquatech TRO 4500 GPD S">Aquatech TRO 4500 GPD S</option>
                <option value="Aquatech TRO 7500 GPD L">Aquatech TRO 7500 GPD L</option>
                <option value="Aquatech TRO 6000 GPD s">Aquatech TRO 6000 GPD s</option>
                <option value="RENALPRO R104">RENALPRO R104</option>
                <option value="UF beaver 8.0 AD">UF beaver 8.0 AD</option>
                <option value="UF 24.0">UF 24.0</option>
                <option value="Frame TRO 1500 GPD">Frame TRO 1500 GPD</option>
                <option value="Frame TRO 6000 GPD">Frame TRO 6000 GPD</option>
                <option value="Frame TRO 250 GPD/ekonomi">Frame TRO 250 GPD/ekonomi</option>
                <option value="Frame TRO 250 GPD/R">Frame TRO 250 GPD/R</option>
                <option value="Panel STP PUSKESMAS">Panel STP PUSKESMAS</option>
                <option value="Panel Conductivity">Panel Conductivity</option>
                <option value="Panel Lift Pump">Panel Lift Pump</option>
                <option value="UPWS-50">UPWS-50</option>
                <option value="MX 1500 + SUHU">MX 1500 + SUHU</option>
                <option value="MX 3000 + SUHU">MX 3000 + SUHU</option>
                <option value="MX 4500 + SUHU">MX 4500 + SUHU</option>
                <option value="MX 6000 + SUHU">MX 6000 + SUHU</option>
                <option value="PRE FILTER MX 1">PRE FILTER MX 1</option>
                <option value="PRE FILTER MX 2">PRE FILTER MX 2</option>
                <option value="PRE FILTER MX 3">PRE FILTER MX 3</option>
                <option value="PRE FILTER MX 4">PRE FILTER MX 4</option>
                <option value="ZOOMBA 1000 LPH">ZOOMBA 1000 LPH</option>
                <option value="ZOOMBA 1500 LPH">ZOOMBA 1500 LPH</option>
                <option value="Panel Sistem Uf">Panel Sistem Uf</option>
                <option value="Panel Control Stp">Panel Control Stp</option>
                <option value="Panel Control Wtp">Panel Control Wtp</option>
                <option value="other">other</option>
            </select>
        </div>
        <div class="field"><label>No Prod</label><input type="text" id="noProduksi" oninput="this.value = this.value.toUpperCase();"></div>
    </div>

    <div class="form-section">
        <div class="field"><label>Target (Hari)</label><input type="number" id="target" value="3" oninput="runLogic()"></div>
        <div class="field"><label>Tanggal Update</label><input type="date" id="tglUpdate" onchange="runLogic()"></div>
        <div class="field"><label>Tahap Produksi</label>
            <select id="tahap">
                <option value="1">1. Persiapan Material</option>
                <option value="2">2. Perakitan Frame</option>
                <option value="3">3. Proses Cat / Finishing</option>
                <option value="4">4. Instalasi Membran/Housing</option>
                <option value="5">5. Kelistrikan & Panel</option>
                <option value="6">6. Running Test & QC</option>
                <option value="7">7. Packing & Selesai (Final)</option>
            </select>
        </div>
        <div class="field"><label>Deadline</label><input type="text" id="deadlineView" readonly style="color:red; font-weight:bold"></div>
    </div>

    <div id="kendalaBox" style="display:none; border: 1px solid var(--danger); padding:10px; border-radius:8px; background:#fff5f5; margin-bottom:15px">
        <label style="color:var(--danger)">⚠️ ALASAN KETERLAMBATAN:</label>
        <textarea id="kendala" style="width:100%; margin-top:5px; text-transform:none" placeholder="Isi kendala di sini..."></textarea>
    </div>

    <button id="btnSave" class="btn-save" onclick="saveData()">SUBMIT LAPORAN PRODUKSI</button>

    <div style="margin-top:30px">
        <div class="summary-title" style="background: #27ae60;">📊 LIVE DATABASE CLOUD (SINKRON HP & LAPTOP)</div>
        <div style="width: 100%; overflow: hidden; border-radius: 10px; border: 2px solid #27ae60; margin-top: 10px;">
            <iframe src="LINK_PUBLISH_TO_WEB_GOOGLE_SHEETS" style="width:100%; height:600px; border:none;"></iframe>
        </div>
    </div>
</div>

<script>
    let isAdmin = false;
    const STORAGE_KEY = 'aq_v20';
    const urlScript = "LINK_WEB_APP_SCRIPT_ANDA"; // GANTI INI DENGAN LINK GOOGLE APPS SCRIPT ANDA

    document.getElementById('tglUpdate').valueAsDate = new Date();

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function handleLogin() {
        if (!isAdmin && prompt("Password Admin:") === "aqua123") isAdmin = true;
        else isAdmin = false;
    }

    function getDeadlineDate(start, days) {
        let date = new Date(start); let count = 0;
        while (count < days) { date.setDate(date.getDate() + 1); if (date.getDay() !== 0 && date.getDay() !== 6) count++; }
        return date;
    }

    function syncData() {
        const spp = document.getElementById('spp').value.toUpperCase();
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const first = logs.find(l => l.spp === spp);
        if (first) {
            document.getElementById('target').value = first.target;
            document.getElementById('namaOp').value = first.nama;
            document.getElementById('namaProduk').value = first.produk;
            document.getElementById('noProduksi').value = first.noProd;
        }
        runLogic();
    }

    function runLogic() {
        const spp = document.getElementById('spp').value.toUpperCase();
        const tglUpdateStr = document.getElementById('tglUpdate').value;
        const target = parseInt(document.getElementById('target').value) || 1;
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const firstEntry = logs.find(l => l.spp === spp);
        let tglMulai = firstEntry ? new Date(firstEntry.tglMulai) : new Date(tglUpdateStr);
        let deadline = getDeadlineDate(tglMulai, target);
        let deadlineStr = deadline.toISOString().split('T')[0];
        document.getElementById('deadlineView').value = deadlineStr;

        const display = document.getElementById('statusDisplay');
        if (!spp) { display.style.display = 'none'; return; }
        display.style.display = 'block';

        const dNow = new Date(tglUpdateStr);
        if (tglUpdateStr === deadlineStr) {
            display.className = "status-success"; document.getElementById('statusText').innerText = "✅ TARGET SELESAI HARI INI";
            document.getElementById('kendalaBox').style.display = "none";
        } else if (dNow > deadline) {
            display.className = "status-late"; document.getElementById('statusText').innerText = "⚠️ TERLAMBAT!";
            document.getElementById('kendalaBox').style.display = "block";
        } else {
            display.className = "status-process"; document.getElementById('statusText').innerText = "⏳ DALAM PROSES";
            document.getElementById('kendalaBox').style.display = "none";
        }
    }

    async function saveData() {
        const spp = document.getElementById('spp').value.toUpperCase();
        const nama = document.getElementById('namaOp').value;
        const produk = document.getElementById('namaProduk').value;
        const tglUpdate = document.getElementById('tglUpdate').value;
        const deadline = document.getElementById('deadlineView').value;
        const tahapText = document.getElementById('tahap').options[document.getElementById('tahap').selectedIndex].text;
        
        if (!spp || !nama || !produk) return alert("Mohon lengkapi data!");

        let statusLog = "ON PROSES";
        if (tglUpdate === deadline) statusLog = "SELESAI";
        else if (new Date(tglUpdate) > new Date(deadline)) statusLog = "TELAT SELESAI";

        const dataKirim = {
            spp, nama, produk, 
            noProd: document.getElementById('noProduksi').value.toUpperCase(),
            target: document.getElementById('target').value,
            tglUpdate, deadline, tahap: tahapText,
            status: statusLog, 
            kendala: document.getElementById('kendala').value || "-"
        };

        // Simpan Lokal
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        logs.push(dataKirim);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));

        // KIRIM KE CLOUD (Google Sheets)
        const btn = document.getElementById('btnSave');
        btn.innerText = "SEDANG MENGIRIM...";
        btn.disabled = true;

        try {
            await fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataKirim)
            });
            alert("Laporan Berhasil Terkirim ke Cloud!");
            location.reload(); 
        } catch (error) {
            alert("Berhasil simpan lokal, tapi gagal kirim ke cloud. Cek koneksi.");
        } finally {
            btn.innerText = "SUBMIT LAPORAN PRODUKSI";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
